<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 Console Error Diagnostic Tool</title>
    <style>
        body { 
            font-family: 'Courier New', monospace; 
            background: #1a1a1a; 
            color: #00ff00; 
            margin: 0; 
            padding: 20px;
        }
        .header {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid #00ff00;
        }
        .console-output {
            background: #000;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 15px;
            height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-size: 12px;
            line-height: 1.4;
        }
        .error { color: #ff4444; font-weight: bold; }
        .warn { color: #ffaa00; }
        .info { color: #4444ff; }
        .success { color: #44ff44; }
        .log { color: #cccccc; }
        .timestamp { color: #888; font-size: 10px; }
        .controls {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        button {
            background: #333;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 8px 16px;
            margin: 5px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #444; }
        .extension-status {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #00ff00;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 CONSOLE ERROR DIAGNOSTIC TOOL</h1>
        <p>Real-time error capture and analysis</p>
    </div>

    <div class="extension-status" id="extensionStatus">
        <h3>🛡️ Extension Protection Status</h3>
        <div id="chromeStatus">Checking...</div>
    </div>

    <div class="controls">
        <button onclick="clearConsole()">Clear Console</button>
        <button onclick="testExtensionError()">🧪 Test Extension Error</button>
        <button onclick="window.location.href='/'">🏠 Go to Main App</button>
        <button onclick="downloadLog()">💾 Download Log</button>
    </div>

    <div class="console-output" id="consoleOutput">
        <div class="info">🔍 Console monitoring started...</div>
    </div>

    <script>
        let errorLog = [];
        let consoleOutput = document.getElementById('consoleOutput');

        function addToConsole(type, message, timestamp = new Date()) {
            const entry = {
                type: type,
                message: message,
                timestamp: timestamp.toISOString()
            };
            errorLog.push(entry);

            const div = document.createElement('div');
            div.className = type;
            div.innerHTML = `<span class="timestamp">[${timestamp.toLocaleTimeString()}]</span> ${message}`;
            consoleOutput.appendChild(div);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;

            // Keep only last 1000 entries
            if (errorLog.length > 1000) {
                errorLog = errorLog.slice(-1000);
                const children = consoleOutput.children;
                if (children.length > 1000) {
                    consoleOutput.removeChild(children[0]);
                }
            }
        }

        // Capture all console methods
        const originalConsole = {
            log: console.log,
            error: console.error,
            warn: console.warn,
            info: console.info
        };

        console.log = function(...args) {
            addToConsole('log', '📝 ' + args.join(' '));
            originalConsole.log.apply(console, args);
        };

        console.error = function(...args) {
            addToConsole('error', '❌ ' + args.join(' '));
            originalConsole.error.apply(console, args);
        };

        console.warn = function(...args) {
            addToConsole('warn', '⚠️ ' + args.join(' '));
            originalConsole.warn.apply(console, args);
        };

        console.info = function(...args) {
            addToConsole('info', 'ℹ️ ' + args.join(' '));
            originalConsole.info.apply(console, args);
        };

        // Capture unhandled promise rejections
        window.addEventListener('unhandledrejection', function(event) {
            addToConsole('error', `🚨 UNHANDLED PROMISE REJECTION: ${event.reason}`);
            console.error('Unhandled promise rejection:', event.reason);
        });

        // Capture regular errors
        window.addEventListener('error', function(event) {
            addToConsole('error', `🚨 ERROR: ${event.message} at ${event.filename}:${event.lineno}`);
        });

        // Check extension status
        function checkExtensionStatus() {
            const statusDiv = document.getElementById('chromeStatus');
            let status = '';

            if (typeof chrome !== 'undefined') {
                status += '✅ Chrome object exists<br>';
                if (chrome.runtime) {
                    status += '✅ Chrome.runtime exists<br>';
                    status += `🔍 Runtime ID: ${chrome.runtime.id || 'undefined'}<br>`;
                    status += `🔍 SendMessage type: ${typeof chrome.runtime.sendMessage}<br>`;
                    
                    if (chrome.runtime.id === undefined) {
                        status += '🛡️ <span style="color: #44ff44;">PROTECTION ACTIVE: Chrome object neutralized</span><br>';
                    } else {
                        status += '⚠️ <span style="color: #ff4444;">REAL EXTENSION DETECTED</span><br>';
                    }
                } else {
                    status += '❌ Chrome.runtime missing<br>';
                }
            } else {
                status += '❌ Chrome object missing<br>';
            }

            statusDiv.innerHTML = status;
        }

        function clearConsole() {
            consoleOutput.innerHTML = '<div class="info">🔍 Console cleared...</div>';
            errorLog = [];
        }

        function testExtensionError() {
            addToConsole('info', '🧪 Testing extension error simulation...');
            
            // Simulate the exact error
            setTimeout(() => {
                try {
                    const fakeError = new Error('Could not establish connection. Receiving end does not exist.');
                    Promise.reject(fakeError);
                } catch (e) {
                    addToConsole('error', '🧪 Test error thrown: ' + e.message);
                }
            }, 100);
        }

        function downloadLog() {
            const logData = errorLog.map(entry => 
                `[${entry.timestamp}] ${entry.type.toUpperCase()}: ${entry.message}`
            ).join('\n');
            
            const blob = new Blob([logData], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `console-log-${new Date().toISOString().slice(0,19)}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Initialize
        addToConsole('success', '🚀 Diagnostic tool initialized');
        checkExtensionStatus();

        // Log current URL and environment
        addToConsole('info', `🌐 Current URL: ${window.location.href}`);
        addToConsole('info', `🖥️ User Agent: ${navigator.userAgent}`);

        console.log('🔍 Diagnostic tool ready - navigate to main app and interact with shows');
    </script>
</body>
</html>
