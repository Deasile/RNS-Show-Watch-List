<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RNS Show Watch List</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1><i class="fas fa-tv"></i> RNS Show Watch List</h1>
            <p class="subtitle">Track your anime and shows with ease</p>
        </header>

        <!-- Controls -->
        <div class="controls">
            <!-- Search -->
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search shows..." class="search-input">
            </div>

            <!-- Filters -->
            <div class="filters">
                <select id="statusFilter" class="filter-select">
                    <option value="">All Status</option>
                    <option value="Watching">Watching</option>
                    <option value="Current">Current</option>
                    <option value="Completed">Completed</option>
                    <option value="Planned">Planned</option>
                    <option value="On Hold">On Hold</option>
                </select>

                <select id="sortBy" class="filter-select">
                    <option value="name">Sort by Name</option>
                    <option value="progress">Sort by Progress</option>
                    <option value="rating">Sort by Rating</option>
                    <option value="status">Sort by Status</option>
                </select>

                <button id="toggleView" class="btn btn-secondary">
                    <i class="fas fa-th"></i> Grid View
                </button>
            </div>

            <!-- Export -->
            <div class="export-buttons">
                <button id="exportJson" class="btn btn-primary">
                    <i class="fas fa-download"></i> Export JSON
                </button>
                <button id="exportCsv" class="btn btn-primary">
                    <i class="fas fa-file-csv"></i> Export CSV
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalShows">0</div>
                <div class="stat-label">Total Shows</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="watchingShows">0</div>
                <div class="stat-label">Watching</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedShows">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="averageProgress">0%</div>
                <div class="stat-label">Avg Progress</div>
            </div>
        </div>

        <!-- Show List -->
        <div class="show-list" id="showList">
            <!-- Shows will be dynamically populated here -->
        </div>

        <!-- Add Show Modal -->
        <div id="addShowModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Add New Show</h2>
                    <span class="close">&times;</span>
                </div>
                <div class="modal-body">
                    <form id="addShowForm">
                        <div class="form-group">
                            <label for="showName">Show Name</label>
                            <input type="text" id="showName" required>
                        </div>
                        <div class="form-group">
                            <label for="showStatus">Status</label>
                            <select id="showStatus">
                                <option value="Planned">Planned</option>
                                <option value="Watching">Watching</option>
                                <option value="Completed">Completed</option>
                                <option value="On Hold">On Hold</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="showEpisodes">Total Episodes</label>
                            <input type="number" id="showEpisodes" min="0">
                        </div>
                        <div class="form-group">
                            <label for="showWatched">Watched Episodes</label>
                            <input type="number" id="showWatched" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label for="showRating">Rating</label>
                            <div class="star-rating" id="newShowRating">
                                <i class="far fa-star" data-rating="1"></i>
                                <i class="far fa-star" data-rating="2"></i>
                                <i class="far fa-star" data-rating="3"></i>
                                <i class="far fa-star" data-rating="4"></i>
                                <i class="far fa-star" data-rating="5"></i>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Add Show</button>
                            <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Floating Add Button -->
        <button id="addShowBtn" class="floating-btn">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
