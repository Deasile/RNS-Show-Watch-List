<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Extension Error Correlation Test</title>
    <style>
        body { 
            font-family: 'Courier New', monospace; 
            background: #1a1a1a; 
            color: #00ff00; 
            margin: 0; 
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: 100vh;
        }
        .panel {
            background: #2a2a2a;
            border: 2px solid #00ff00;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
        }
        .header {
            background: #333;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
        }
        .error { color: #ff4444; font-weight: bold; }
        .warn { color: #ffaa00; }
        .info { color: #4444ff; }
        .success { color: #44ff44; }
        .user-action { color: #ff6b35; font-weight: bold; }
        .timestamp { color: #888; font-size: 10px; }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #333;
            font-size: 11px;
            line-height: 1.3;
        }
        .correlation { background: #4a2a4a; border-left-color: #ff6b35; }
        button {
            background: #333;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 5px 10px;
            margin: 2px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
        }
        button:hover { background: #444; }
        .test-button { background: #ff6b35; color: #000; border-color: #ff6b35; }
        .controls {
            background: #333;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="panel">
        <div class="header">🎯 USER ACTIONS</div>
        <div class="controls">
            <button class="test-button" onclick="testShowInteraction()">🎮 Test Show Click</button>
            <button class="test-button" onclick="testViewToggle()">👁️ Test View Toggle</button>
            <button class="test-button" onclick="testStatusChange()">📊 Test Status Change</button>
            <button onclick="clearUserLog()">Clear</button>
        </div>
        <div id="userActions">
            <div class="log-entry info">🎯 User action tracking started...</div>
        </div>
    </div>
    
    <div class="panel">
        <div class="header">🚨 EXTENSION ERRORS</div>
        <div class="controls">
            <button onclick="testExtensionError()">🧪 Trigger Test Error</button>
            <button onclick="clearErrorLog()">Clear</button>
            <button onclick="downloadCorrelationData()">💾 Download Data</button>
        </div>
        <div id="extensionErrors">
            <div class="log-entry info">🚨 Extension error monitoring started...</div>
        </div>
    </div>

    <script>
        let userActionLog = [];
        let extensionErrorLog = [];
        let correlationData = [];
        
        const userActionsDiv = document.getElementById('userActions');
        const extensionErrorsDiv = document.getElementById('extensionErrors');
        
        function logUserAction(action, details = '') {
            const timestamp = new Date().toISOString();
            const entry = {
                timestamp,
                type: 'user_action',
                action,
                details
            };
            
            userActionLog.push(entry);
            
            const div = document.createElement('div');
            div.className = 'log-entry user-action';
            div.innerHTML = `
                <span class="timestamp">[${new Date(timestamp).toLocaleTimeString()}]</span>
                <strong>👤 ${action}</strong> ${details}
            `;
            userActionsDiv.appendChild(div);
            userActionsDiv.scrollTop = userActionsDiv.scrollHeight;
            
            // Check for recent extension errors (within 1 second)
            checkCorrelation(entry);
        }
        
        function logExtensionError(error) {
            const timestamp = new Date().toISOString();
            const entry = {
                timestamp,
                type: 'extension_error',
                error: error.toString(),
                stack: error.stack || 'No stack trace'
            };
            
            extensionErrorLog.push(entry);
            
            const div = document.createElement('div');
            div.className = 'log-entry error';
            div.innerHTML = `
                <span class="timestamp">[${new Date(timestamp).toLocaleTimeString()}]</span>
                <strong>🚨 EXTENSION ERROR:</strong><br>
                ${error.toString()}
            `;
            extensionErrorsDiv.appendChild(div);
            extensionErrorsDiv.scrollTop = extensionErrorsDiv.scrollHeight;
            
            // Check for recent user actions (within 2 seconds)
            checkCorrelation(entry);
        }
        
        function checkCorrelation(newEntry) {
            const correlationWindow = 2000; // 2 seconds
            const entryTime = new Date(newEntry.timestamp).getTime();
            
            if (newEntry.type === 'user_action') {
                // Look for extension errors within 2 seconds after this user action
                const recentErrors = extensionErrorLog.filter(errorEntry => {
                    const errorTime = new Date(errorEntry.timestamp).getTime();
                    return Math.abs(errorTime - entryTime) <= correlationWindow;
                });
                
                if (recentErrors.length > 0) {
                    logCorrelation(newEntry, recentErrors);
                }
            } else if (newEntry.type === 'extension_error') {
                // Look for user actions within 2 seconds before this error
                const recentActions = userActionLog.filter(actionEntry => {
                    const actionTime = new Date(actionEntry.timestamp).getTime();
                    return entryTime - actionTime <= correlationWindow && entryTime - actionTime >= 0;
                });
                
                if (recentActions.length > 0) {
                    logCorrelation(recentActions[recentActions.length - 1], [newEntry]);
                }
            }
        }
        
        function logCorrelation(userAction, extensionErrors) {
            const correlation = {
                timestamp: new Date().toISOString(),
                userAction,
                extensionErrors,
                timeDiff: extensionErrors.map(err => {
                    const userTime = new Date(userAction.timestamp).getTime();
                    const errorTime = new Date(err.timestamp).getTime();
                    return errorTime - userTime;
                })
            };
            
            correlationData.push(correlation);
            
            // Add to both panels
            const corrDiv = document.createElement('div');
            corrDiv.className = 'log-entry correlation';
            corrDiv.innerHTML = `
                <span class="timestamp">[${new Date().toLocaleTimeString()}]</span>
                <strong>🎯 CORRELATION DETECTED!</strong><br>
                User Action: ${userAction.action}<br>
                Extension Error: ${correlation.timeDiff[0]}ms later<br>
                <strong>Possible Trigger Relationship!</strong>
            `;
            
            userActionsDiv.appendChild(corrDiv.cloneNode(true));
            extensionErrorsDiv.appendChild(corrDiv);
            
            console.log('🎯 CORRELATION DETECTED:', correlation);
        }
        
        // Test functions
        function testShowInteraction() {
            logUserAction('TEST_SHOW_CLICK', 'Simulated show interaction');
            
            // Simulate clicking on clean app in iframe or new window
            setTimeout(() => {
                logUserAction('SHOW_ELEMENT_CLICKED', 'Rating star or status dropdown');
            }, 100);
        }
        
        function testViewToggle() {
            logUserAction('VIEW_TOGGLE', 'Grid ↔ List view switch');
        }
        
        function testStatusChange() {
            logUserAction('STATUS_CHANGE', 'Show status dropdown modified');
        }
        
        function testExtensionError() {
            logUserAction('TEST_ERROR_TRIGGER', 'Manual test error trigger');
            
            setTimeout(() => {
                try {
                    const error = new Error('Could not establish connection. Receiving end does not exist.');
                    Promise.reject(error);
                } catch (e) {
                    // Simulate extension error
                }
            }, 200);
        }
        
        function clearUserLog() {
            userActionLog = [];
            userActionsDiv.innerHTML = '<div class="log-entry info">🎯 User action tracking cleared...</div>';
        }
        
        function clearErrorLog() {
            extensionErrorLog = [];
            extensionErrorsDiv.innerHTML = '<div class="log-entry info">🚨 Extension error monitoring cleared...</div>';
        }
        
        function downloadCorrelationData() {
            const data = {
                userActions: userActionLog,
                extensionErrors: extensionErrorLog,
                correlations: correlationData,
                summary: {
                    totalUserActions: userActionLog.length,
                    totalExtensionErrors: extensionErrorLog.length,
                    totalCorrelations: correlationData.length,
                    correlationRate: correlationData.length / Math.max(userActionLog.length, 1) * 100
                }
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `extension-error-correlation-${new Date().toISOString().slice(0,19)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        // Global error monitoring
        window.addEventListener('unhandledrejection', function(event) {
            if (event.reason && event.reason.message && 
                event.reason.message.includes('Could not establish connection')) {
                logExtensionError(event.reason);
            }
        });
        
        window.addEventListener('error', function(event) {
            if (event.message && event.message.includes('Could not establish connection')) {
                logExtensionError(new Error(event.message));
            }
        });
        
        // Monitor clicks on this page
        document.addEventListener('click', function(event) {
            if (event.target.tagName === 'BUTTON' && !event.target.textContent.includes('Clear')) {
                logUserAction('BUTTON_CLICK', `Clicked: ${event.target.textContent}`);
            }
        });
        
        console.log('🎯 Extension Error Correlation Test Ready');
        console.log('🎮 Use test buttons to simulate user actions');
        console.log('🚨 Extension errors will be automatically captured and correlated');
    </script>
</body>
</html>
